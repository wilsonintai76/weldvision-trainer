<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50mm" height="50mm">
  <title>Calibration Dimple Jig</title>
  <rect width="50" height="50" fill="white"/>
  <!-- 3mm dimple at center -->
  <circle cx="25" cy="25" r="1.5" fill="black"/>
  <!-- Crosshair -->
  <line x1="15" y1="25" x2="22" y2="25" stroke="black" stroke-width="0.3"/>
  <line x1="28" y1="25" x2="35" y2="25" stroke="black" stroke-width="0.3"/>
  <line x1="25" y1="15" x2="25" y2="22" stroke="black" stroke-width="0.3"/>
  <line x1="25" y1="28" x2="25" y2="35" stroke="black" stroke-width="0.3"/>
  <!-- Target rings -->
  <circle cx="25" cy="25" r="3" fill="none" stroke="black" stroke-width="0.2"/>
  <circle cx="25" cy="25" r="6" fill="none" stroke="black" stroke-width="0.2"/>
  <circle cx="25" cy="25" r="10" fill="none" stroke="black" stroke-width="0.2"/>
  <!-- Label -->
  <text x="25" y="42" text-anchor="middle" font-size="3" font-family="sans-serif" fill="#666">
    Ø3mm × 3mm deep
  </text>
</svg>
