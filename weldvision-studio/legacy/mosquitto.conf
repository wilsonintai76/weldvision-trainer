# ============================================================================
# WeldVision Trainer 2.0 — Classroom Mosquitto Broker Configuration
# ============================================================================
#
# This configuration turns the instructor's laptop into a local MQTT broker
# that all student Android phones connect to over Wi-Fi.
#
# Installation (Windows):
#   1. Download Mosquitto from https://mosquitto.org/download/
#   2. Install to C:\Program Files\mosquitto\
#   3. Copy this file to C:\Program Files\mosquitto\mosquitto.conf
#   4. Start:  net start mosquitto
#      or:     mosquitto -c mosquitto.conf -v
#
# Installation (macOS):
#   brew install mosquitto
#   mosquitto -c mosquitto.conf
#
# Installation (Linux):
#   sudo apt install mosquitto mosquitto-clients
#   mosquitto -c mosquitto.conf
#
# ============================================================================

# ── Listeners ──────────────────────────────────────────────────────────────

# TCP listener for Android phones (native MQTT)
listener 1883 0.0.0.0
protocol mqtt

# WebSocket listener for the PWA dashboard (browser)
listener 9001 0.0.0.0
protocol websockets

# ── Security (Classroom LAN — minimal) ─────────────────────────────────────

# Allow anonymous connections on the classroom LAN.
# In production, add a password file:
#   allow_anonymous false
#   password_file C:\Program Files\mosquitto\pwfile
allow_anonymous true

# ── Performance Tuning ─────────────────────────────────────────────────────

# Max inflight QoS 0 messages per client (60 Hz × N students)
max_inflight_messages 500

# Max queued messages for disconnected clients (keep small for real-time)
max_queued_messages 100

# TCP keepalive to detect dead student connections quickly
persistent_client_expiration 30s

# ── Logging ─────────────────────────────────────────────────────────────────

# Log to file for instructor review
log_dest file C:\Program Files\mosquitto\log\weldvision.log

# Log types (comment out in production to reduce I/O)
log_type error
log_type warning
log_type notice
# log_type information   # Uncomment for debugging
# log_type debug          # Uncomment for debugging

# ── Topic ACLs (Optional — Uncomment for Production) ────────────────────────
#
# Restrict students to publishing only on their own topic:
#
#   acl_file C:\Program Files\mosquitto\weldvision.acl
#
# weldvision.acl content:
#   # Students can only publish to their own seat topic
#   pattern write weldvision/student/%u/live
#   pattern write weldvision/student/%u/status
#   # Dashboard can subscribe to all student topics
#   pattern read  weldvision/student/+/live
#   pattern read  weldvision/student/+/status
#
# ============================================================================
